<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Notesnook Simple Clipper</title>
    <style>
      :root {
        --nord0: #2e3440;
        --nord1: #3b4252;
        --nord2: #434c5e;
        --nord3: #4c566a;
        --nord4: #d8dee9;
        --nord5: #e5e9f0;
        --nord6: #eceff4;
        --nord7: #8fbcbb;
        --nord8: #88c0d0;
        --nord9: #81a1c1;
        --nord10: #5e81ac;
        --nord11: #bf616a;
        --nord12: #d08770;
        --nord13: #ebcb8b;
        --nord14: #a3be8c;
        --nord15: #b48ead;
        --font-mono: "MartianMono Nerd Font", "MartianMono NF", "Martian Mono",
          ui-monospace, "Cascadia Code", monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 460px;
        height: 520px;
        display: flex;
        flex-direction: column;
        font-family: var(--font-mono);
        margin: 0;
        padding: 22px;
        background: var(--nord0);
        color: var(--nord6);
      }
      .top-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
        flex-shrink: 0;
      }
      #title-row {
        flex: 1;
        background: var(--nord1);
        border-radius: 6px;
        padding: 6px 8px;
      }
      #title-input {
        width: 100%;
        display: block;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 700;
        color: var(--nord8);
        padding: 0;
      }
      #title-input::placeholder {
        font-weight: 400;
        color: var(--nord4);
        opacity: 1;
      }
      #title-input:disabled {
        color: var(--nord3);
      }
      #title-remove-btn[hidden] {
        display: none;
      }
      #settings-icon-btn {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 7px;
        background: var(--nord1);
        color: var(--nord4);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 14px;
        line-height: 1;
      }
      #settings-icon-btn:hover {
        background: var(--nord2);
        color: var(--nord8);
      }
      #settings-icon-btn[hidden] {
        display: none;
      }
      #setup-warning {
        font-size: 11px;
        color: var(--nord13);
        margin: 0 0 10px;
        line-height: 1.5;
        flex-shrink: 0;
      }
      #setup-warning[hidden] {
        display: none;
      }
      #setup-warning a {
        color: var(--nord13);
        text-decoration: underline;
      }
      #setup-warning a:hover {
        color: var(--nord12);
      }
      #hint {
        font-size: 10px;
        color: var(--nord9);
        margin: 10px 0;
        line-height: 1.5;
        flex-shrink: 0;
      }
      #empty-hint {
        font-size: 11px;
        color: var(--nord4);
        line-height: 1.5;
        margin: 8px 0 12px;
        flex-shrink: 0;
      }
      #board-list {
        list-style: none;
        max-height: 300px;
        margin: 0;
        padding: 0 10px 0 0;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--nord3) transparent;
        flex-shrink: 0;
      }
      #board-list::-webkit-scrollbar {
        width: 8px;
      }
      #board-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #board-list::-webkit-scrollbar-thumb {
        background: var(--nord3);
        border-radius: 4px;
      }
      #board-list::-webkit-scrollbar-thumb:hover {
        background: var(--nord9);
      }
      .board-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--nord2);
        border-top: 2px solid transparent;
        cursor: grab;
      }
      .board-item.dragging {
        opacity: 0.4;
      }
      .board-item.drag-over {
        border-top: 2px solid var(--nord8);
      }
      .drag-handle {
        flex-shrink: 0;
        color: var(--nord4);
        font-size: 11px;
        line-height: 1;
        user-select: none;
      }
      .item-preview {
        flex: 1;
        font-size: 11px;
        color: var(--nord6);
        word-break: break-word;
        line-height: 1.4;
      }
      .item-preview img {
        max-width: 100%;
        max-height: 60px;
        border-radius: 4px;
        display: block;
      }
      .remove-btn {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        border: none;
        border-radius: 4px;
        background: var(--nord1);
        color: var(--nord4);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1;
      }
      .remove-btn:hover {
        background: var(--nord11);
        color: var(--nord6);
      }
      .actions-row {
        display: flex;
        gap: 8px;
        margin-top: auto;
        padding-top: 18px;
        flex-shrink: 0;
      }
      button#save-btn {
        flex: 1;
        padding: 10px;
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.03em;
        border: none;
        border-radius: 6px;
        background: var(--nord10);
        color: var(--nord6);
        cursor: pointer;
      }
      button#save-btn:disabled {
        background: var(--nord2);
        color: var(--nord3);
        cursor: default;
      }
      button#save-btn:hover:not(:disabled) {
        background: var(--nord9);
      }
      button#clear-btn {
        flex-shrink: 0;
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 700;
        border: none;
        border-radius: 6px;
        background: var(--nord1);
        color: var(--nord4);
        cursor: pointer;
      }
      button#clear-btn:disabled {
        color: var(--nord3);
        cursor: default;
      }
      button#clear-btn:hover:not(:disabled) {
        background: var(--nord11);
        color: var(--nord6);
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        min-height: 16px;
        flex-shrink: 0;
      }
      #status.success {
        color: var(--nord14);
      }
      #status.error {
        color: var(--nord11);
      }
    </style>
  </head>
  <body>
    <div class="top-row">
      <div id="title-row">
        <input
          type="text"
          id="title-input"
          placeholder="using web page title as note title"
        />
      </div>
      <button id="title-remove-btn" class="remove-btn" title="Use page title" hidden>
        ×
      </button>
      <button id="settings-icon-btn" title="Settings" hidden>⚙</button>
    </div>
    <p id="setup-warning" hidden>
      ⚠ <a id="options-link" href="#">Set up API key</a>
    </p>
    <p id="hint">
      Right-click selected text to add it or use it as the title. Right-click
      an image to add it. Drag items below to reorder.
    </p>

    <p id="empty-hint">Nothing added yet. The link will still be saved.</p>
    <ul id="board-list"></ul>

    <div class="actions-row">
      <button id="clear-btn" title="Clear everything">Clear All</button>
      <button id="save-btn">Save Note</button>
    </div>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
